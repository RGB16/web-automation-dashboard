services:
  - type: web
    name: web-automation-dashboard
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx playwright install --with-deps chromium
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true
    healthCheckPath: /api/health

